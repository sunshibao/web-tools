<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Tools 工具箱 - JSON To Protobuf</title>
    <link rel="stylesheet" href="assets/common.css">
</head>
<body>

<h1>JSON To Protobuf</h1>
<div class="container">
    <div class="left-panel">
        <label for="jsonData">JSON Data:</label><br>
        <textarea id="jsonData" placeholder="Paste your JSON data here."></textarea><br>
        <button onclick="generateProtobuf()">Generate Protobuf</button>
        <div id="error-message" class="error"></div>
    </div>
    <div class="right-panel">
        <label for="result">Generated Protobuf:</label><br>
        <div id="result"></div>
    </div>
</div>

<script>
    function scalarType(v, ctx) {
        if (v === null) {
            ctx.needAny = true;
            return "google.protobuf.Any";
        }
        switch (typeof v) {
            case 'string':  return 'string';
            case 'number':  return Number.isInteger(v) ? 'int32' : 'double';
            case 'boolean': return 'bool';
            default:        return 'string';
        }
    }

    function generateProtobuf() {
        const jsonData = document.getElementById("jsonData").value;
        const resultDiv = document.getElementById("result");
        const errorMessageDiv = document.getElementById("error-message");
        resultDiv.textContent = "";
        errorMessageDiv.textContent = "";

        try {
            const parsed = JSON.parse(jsonData);
            if (!parsed || typeof parsed !== 'object') {
                throw new Error("需要对象或对象数组");
            }
            const sample = Array.isArray(parsed) ? parsed[0] : parsed;
            if (!sample || typeof sample !== 'object') {
                throw new Error("样本数据为空");
            }

            const ctx = { needAny: false };
            const messageName = "SomeMessage";
            const messageDefinitions = {};

            function convertJsonToProtobuf(obj, name) {
                let messageBody = "";
                const keys = Object.keys(obj);
                keys.forEach((key, idx) => {
                    const value = obj[key];
                    const isRepeated = Array.isArray(value);
                    let type;

                    if (value && typeof value === 'object' && !isRepeated) {
                        const nested = name + "_" + key.charAt(0).toUpperCase() + key.slice(1);
                        if (!messageDefinitions[nested]) {
                            messageDefinitions[nested] = convertJsonToProtobuf(value, nested);
                        }
                        type = nested;
                    } else if (isRepeated) {
                        const first = value[0];
                        if (first && typeof first === 'object' && !Array.isArray(first)) {
                            const nested = name + "_" + key.charAt(0).toUpperCase() + key.slice(1);
                            if (!messageDefinitions[nested]) {
                                messageDefinitions[nested] = convertJsonToProtobuf(first, nested);
                            }
                            type = nested;
                        } else if (value.length === 0) {
                            type = 'string'; // 空数组无法推断，默认 string
                        } else {
                            type = scalarType(first, ctx);
                        }
                    } else {
                        type = scalarType(value, ctx);
                    }
                    messageBody += `\t${isRepeated ? "repeated " : ""}${type} ${key} = ${idx + 1};\n`;
                });
                return messageBody;
            }

            const mainBody = convertJsonToProtobuf(sample, messageName);

            let protobuf = `syntax = "proto3";\n`;
            if (ctx.needAny) {
                protobuf += `import "google/protobuf/any.proto";\n`;
            }
            protobuf += `\n`;

            for (const msg in messageDefinitions) {
                protobuf += `message ${msg} {\n${messageDefinitions[msg]}}\n\n`;
            }
            protobuf += `message ${messageName} {\n${mainBody}}\n`;

            resultDiv.textContent = protobuf;
        } catch (error) {
            errorMessageDiv.textContent = "Invalid JSON format: " + error.message;
            resultDiv.textContent = "";
        }
    }
</script>

<script src="assets/common.js"></script>
</body>
</html>
