<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Tools 工具箱 - Base64 / 图片互转</title>
    <link rel="stylesheet" href="assets/common.css">
    <style>
        #previewImage {
            max-width: 100%;
            max-height: 420px;
            margin-top: 10px;
            border: 1px solid var(--border-soft);
            border-radius: var(--radius-sm);
            display: none;
        }

        .url-row {
            display: flex;
            gap: 8px;
            align-items: stretch;
        }

        .url-row input[type="text"] {
            flex: 1;
            margin-bottom: 0;
        }

        .url-row button {
            flex-shrink: 0;
            white-space: nowrap;
        }

        .file-input-container {
            margin-bottom: 12px;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>

<h1>Base64 图片转换工具</h1>
<div class="container">
    <div class="left-panel">
        <div class="file-input-container">
            <label for="imageUrl">图片链接 (URL):</label>
            <div class="url-row">
                <input type="text" id="imageUrl" placeholder="粘贴图片链接，例如 https://example.com/pic.png">
                <button class="primary" onclick="convertFromUrl()">链接转 Base64</button>
            </div>
        </div>

        <div class="file-input-container">
            <label for="base64Input">Base64 编码:</label>
            <textarea id="base64Input" placeholder="在此粘贴图片的Base64编码或上传图片自动获取Base64编码"></textarea>
        </div>

        <div class="button-group">
            <button onclick="convertToImage()">转换为图片</button>
            <button onclick="clearAll()">清空</button>
            <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="handleFileSelect(event)">
            <button onclick="document.getElementById('fileInput').click()">上传图片</button>
        </div>
    </div>
    <div class="right-panel">
        <label>图片预览:</label>
        <div id="result">
            <img id="previewImage" alt="预览图片">
            <p id="statusText">图片将在此处显示</p>
        </div>
    </div>
</div>

<script>
    // 根据 base64 头部嵌格嵌型只识别常见图片类型
    function detectMimeType(base64) {
        if (base64.startsWith('iVBORw0KGgo')) return 'image/png';
        if (base64.startsWith('/9j/')) return 'image/jpeg';
        if (base64.startsWith('R0lGOD')) return 'image/gif';
        if (base64.startsWith('UklGR')) return 'image/webp';
        if (base64.startsWith('Qk')) return 'image/bmp';
        if (base64.startsWith('PHN2Zy') || base64.startsWith('PD94bWw')) return 'image/svg+xml';
        if (base64.startsWith('AAABAA')) return 'image/x-icon';
        return 'image/jpeg';
    }

    function convertToImage() {
        const base64Input = document.getElementById("base64Input").value.trim();
        const previewImage = document.getElementById("previewImage");
        const statusText = document.getElementById("statusText");

        if (!base64Input) {
            statusText.textContent = "请输入Base64编码";
            previewImage.style.display = "none";
            return;
        }

        try {
            if (!base64Input.startsWith("data:image/")) {
                const mime = detectMimeType(base64Input);
                previewImage.src = `data:${mime};base64,` + base64Input;
            } else {
                previewImage.src = base64Input;
            }

            previewImage.style.display = "block";
            statusText.textContent = "图片预览:";
        } catch (error) {
            statusText.textContent = "转换失败: " + error.message;
            previewImage.style.display = "none";
        }
    }

    function clearAll() {
        document.getElementById("base64Input").value = "";
        document.getElementById("imageUrl").value = "";
        document.getElementById("previewImage").src = "";
        document.getElementById("previewImage").style.display = "none";
        document.getElementById("statusText").textContent = "图片将在此处显示";
    }

    // 通过 URL 获取图片并转为 Base64
    async function convertFromUrl() {
        const url = document.getElementById("imageUrl").value.trim();
        const statusText = document.getElementById("statusText");
        const previewImage = document.getElementById("previewImage");

        if (!url) {
            statusText.textContent = "请输入图片链接";
            return;
        }
        if (!/^https?:\/\//i.test(url)) {
            statusText.textContent = "链接需以 http:// 或 https:// 开头";
            return;
        }

        statusText.textContent = "正在拉取图片 ...";
        previewImage.style.display = "none";

        try {
            const res = await fetch(url, { mode: "cors" });
            if (!res.ok) throw new Error("HTTP " + res.status);
            const blob = await res.blob();
            if (!blob.type.startsWith("image/")) {
                throw new Error("返回的不是图片类型: " + (blob.type || "未知"));
            }
            const dataUrl = await new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = () => reject(reader.error || new Error("读取失败"));
                reader.readAsDataURL(blob);
            });
            document.getElementById("base64Input").value = dataUrl;
            previewImage.src = dataUrl;
            previewImage.style.display = "block";
            statusText.textContent = "图片预览:";
        } catch (err) {
            statusText.textContent = "拉取失败: " + err.message + "（可能为跨域限制，请换支持 CORS 的图片源或先下载再上传）";
        }
    }

    function handleFileSelect(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function (e) {
            const base64Input = document.getElementById("base64Input");
            base64Input.value = e.target.result;

            const previewImage = document.getElementById("previewImage");
            previewImage.src = e.target.result;
            previewImage.style.display = "block";
            document.getElementById("statusText").textContent = "图片预览:";
        };
        reader.readAsDataURL(file);
    }

    // 拖放上传
    document.getElementById("base64Input").addEventListener("dragover", function (e) {
        e.preventDefault();
        e.stopPropagation();
        this.style.border = "2px dashed #008000";
    });

    document.getElementById("base64Input").addEventListener("dragleave", function (e) {
        e.preventDefault();
        e.stopPropagation();
        this.style.border = "1px solid #ccc";
    });

    document.getElementById("base64Input").addEventListener("drop", function (e) {
        e.preventDefault();
        e.stopPropagation();
        this.style.border = "1px solid #ccc";

        const file = e.dataTransfer.files[0];
        if (!file) return;

        if (file.type.startsWith("image/")) {
            const reader = new FileReader();
            reader.onload = function (ev) {
                document.getElementById("base64Input").value = ev.target.result;
                const previewImage = document.getElementById("previewImage");
                previewImage.src = ev.target.result;
                previewImage.style.display = "block";
                document.getElementById("statusText").textContent = "图片预览:";
            };
            reader.readAsDataURL(file);
        } else {
            alert("请拖放图片文件");
        }
    });
</script>

<script src="assets/common.js"></script>
</body>
</html>
