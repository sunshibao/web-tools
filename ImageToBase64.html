        text-decoration: none;

        padding: 5px 10px;
        border-radius: 5px;
        transition: background-color 0.3s ease;
    }

    nav a:hover, nav a.active {

        color: white;
    }

        display: flex;
        flex-grow: 1;
    }

    .left-panel, .right-panel {

        padding: 10px;
        border: 1px solid #ccc;
        margin: 5px;
        box-sizing: border-box;
        overflow: auto;
    }

    textarea {
        width: calc(100% - 10px);
        height: 300px;
        margin-bottom: 10px;
        padding: 5px;
        border: 1px solid #ccc;
        resize: vertical;
        box-sizing: border-box;
        font-family: monospace;
    }

    /* 底部样式 */
    footer {
        background-color: white;
        padding: 10px;
        text-align: center;
        border-top: 1px solid #ccc;
        margin-top: 20px;
    }
</style>

<h1>Base64 图片转换工具</h1>
<div class="container">
    <div class="left-panel">
        <div class="file-input-container">
            <label for="base64Input">Base64 编码:</label>
            <textarea id="base64Input" placeholder="在此粘贴图片的Base64编码或上传图片自动获取Base64编码"></textarea>
        </div>

        <div class="button-group">
            <button onclick="convertToImage()">转换为图片</button>
            <button onclick="clearAll()">清空</button>
            <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="handleFileSelect(event)">
            <button onclick="document.getElementById('fileInput').click()">上传图片</button>
        </div>
    </div>
    <div class="right-panel">
        <label>图片预览:</label>
        <div id="result">
            <img id="previewImage" alt="预览图片">
            <p id="statusText">图片将在此处显示</p>
        </div>
    </div>
</div>

<script>
    function convertToImage() {
        const base64Input = document.getElementById("base64Input").value.trim();
        const previewImage = document.getElementById("previewImage");
        const statusText = document.getElementById("statusText");
        
        if (!base64Input) {
            statusText.textContent = "请输入Base64编码";
            previewImage.style.display = "none";
            return;
        }

        try {
            // 检查是否是完整的data URL格式
            if (!base64Input.startsWith("data:image/")) {
                // 如果不是，假设它是纯Base64数据，添加默认的image/jpeg前缀
                previewImage.src = "data:image/jpeg;base64," + base64Input;
            } else {
                previewImage.src = base64Input;
            }
            
            previewImage.style.display = "block";
            statusText.textContent = "图片预览:";
        } catch (error) {
            statusText.textContent = "转换失败: " + error.message;
            previewImage.style.display = "none";
        }
    }

    function clearAll() {
        document.getElementById("base64Input").value = "";
        document.getElementById("previewImage").src = "";
        document.getElementById("previewImage").style.display = "none";
        document.getElementById("statusText").textContent = "图片将在此处显示";
    }

    function handleFileSelect(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const base64Input = document.getElementById("base64Input");
            base64Input.value = e.target.result;
            
            // 自动显示图片
            const previewImage = document.getElementById("previewImage");
            previewImage.src = e.target.result;
            previewImage.style.display = "block";
            document.getElementById("statusText").textContent = "图片预览:";
        };
        reader.readAsDataURL(file);
    }

    // 允许拖放文件到文本区域
    document.getElementById("base64Input").addEventListener("dragover", function(e) {
        e.preventDefault();
        e.stopPropagation();
        this.style.border = "2px dashed #008000";
    });

    document.getElementById("base64Input").addEventListener("dragleave", function(e) {
        e.preventDefault();
        e.stopPropagation();
        this.style.border = "1px solid #ccc";
    });

    document.getElementById("base64Input").addEventListener("drop", function(e) {
        e.preventDefault();
        e.stopPropagation();
        this.style.border = "1px solid #ccc";
        
        const file = e.dataTransfer.files[0];
        if (!file) return;
        
        if (file.type.startsWith("image/")) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById("base64Input").value = e.target.result;
                
                // 自动显示图片
                const previewImage = document.getElementById("previewImage");
                previewImage.src = e.target.result;
                previewImage.style.display = "block";
                document.getElementById("statusText").textContent = "图片预览:";
            };
            reader.readAsDataURL(file);
        } else {
            alert("请拖放图片文件");
        }
    });
</script>

<footer>

<script>
    const navLinks = document.querySelectorAll('nav a'); // 获取所有导航链接

    // 导航链接激活状态
    navLinks.forEach(link => {
        link.addEventListener('click', (event) => {
            navLinks.forEach(otherLink => otherLink.classList.remove('active')); // 移除其他链接的激活状态
            link.classList.add('active'); // 给当前链接添加激活状态
        });
    });
</script>
