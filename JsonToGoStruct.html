<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Tools 工具箱 - JSON To GoStruct</title>
    <link rel="stylesheet" href="assets/common.css">
</head>
<body>

<h1>JSON To Go Struct</h1>
<div class="container">
    <div class="left-panel">
        <label for="jsonData">JSON 数据:</label><br>
        <textarea id="jsonData" placeholder="Paste your JSON statement here..."></textarea><br>

        <button onclick="generateGo()">生成 Go Struct</button>
    </div>
    <div class="right-panel">
        <label for="result">生成的 Go Struct 语句:</label><br>
        <div id="result"></div>
    </div>
</div>

<script>
    function generateGo() {
        const jsonDataText = document.getElementById("jsonData").value;
        const resultDiv = document.getElementById("result");
        try {
            const jsonData = JSON.parse(jsonDataText);
            if (typeof jsonData !== 'object' || jsonData === null) {
                resultDiv.textContent = "Invalid JSON: 需要对象或数组";
                return;
            }
            const sample = Array.isArray(jsonData) ? jsonData[0] : jsonData;
            if (!sample || typeof sample !== 'object') {
                resultDiv.textContent = "Invalid JSON: 样本数据为空";
                return;
            }
            resultDiv.textContent = generateGoStruct(sample);
        } catch (error) {
            resultDiv.textContent = "Invalid JSON: " + error.message;
        }
    }

    function generateGoStruct(jsonData, structName = "AutoGenerated") {
        let goCode = `type ${structName} struct {\n`;

        for (const key in jsonData) {
            const value = jsonData[key];
            const fieldName = capitalize(key);
            const fieldType = getGoType(value, key);
            goCode += `\t${fieldName} ${fieldType} \`json:"${key}"\`\n`;
        }
        goCode += "}\n\n";

        for (const key in jsonData) {
            const value = jsonData[key];
            if (value && typeof value === 'object' && !Array.isArray(value)) {
                goCode += generateGoStruct(value, capitalize(key));
            }
            if (Array.isArray(value) && value.length > 0 && value[0] && typeof value[0] === 'object' && !Array.isArray(value[0])) {
                goCode += generateGoStruct(value[0], capitalize(key));
            }
        }
        return goCode;
    }

    // key 为当前字段名，用于给嵌套对象/对象数组生成与外层一致的类型名
    function getGoType(value, key) {
        if (typeof value === "string") return "string";
        if (typeof value === "number") return Number.isInteger(value) ? "int" : "float64";
        if (typeof value === "boolean") return "bool";
        if (Array.isArray(value)) {
            if (value.length === 0) return "[]any";
            const first = value[0];
            if (first && typeof first === 'object' && !Array.isArray(first)) {
                return `[]${capitalize(key)}`;
            }
            return `[]${getGoType(first, key)}`;
        }
        if (value && typeof value === "object") return capitalize(key);
        return "any";
    }

    function capitalize(str) {
        return str.charAt(0).toUpperCase() + str.slice(1);
    }
</script>

<script src="assets/common.js"></script>
</body>
</html>
